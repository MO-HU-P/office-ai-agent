# ============================================================
# Office AI Agent — LLM設定 (デフォルト値)
#
# ★ ふだんの設定変更は、アプリ右上の歯車アイコン(設定画面)からできます。
#   設定画面で保存した内容は data/settings.json に記録され、
#   このファイルより優先されます(再起動・再ビルド不要)。
#   このファイルに戻したいときは data/settings.json を削除してください。
#
# このファイルを直接変更した場合は `docker compose restart backend` で反映されます。
# ============================================================

[llm]
# mode: "cloud" = Ollama Cloud (https://ollama.com, APIキーが.envに必要)
#       "local" = ローカルOllamaコンテナ (初回起動時にモデルを自動ダウンロード)
mode = "cloud"

# --- Cloudモデルの例 (https://ollama.com/library で確認) ---
#   gpt-oss:120b / gemma4:31b / qwen3.5:397b / nemotron-3-ultra
# --- Localモデルの例 (tool calling対応モデルを推奨) ---
#   qwen3.5:9b / gemma4:12b / gpt-oss:20b / 
model = "gpt-oss:120b"

# 思考モード:
#   "auto"  = モデル既定に任せる(推奨)
#   "true" / "false" = 思考のオン/オフ (qwen3等のオンオフ型モデル向け。gpt-oss系には効かない)
#   "low" / "medium" / "high" = 思考の深さ (gpt-oss等のレベル型モデル向け)
# ローカルのqwen3系は "false" 推奨(高速)。gpt-ossで速さ重視なら "low"
reasoning = "auto"

# コンテキスト長 (localモードのみ有効。VRAMに余裕があれば16384に)
num_ctx = 16384

# --- OpenAIプロバイダー (.env に OPENAI_API_KEY を設定した場合のみ有効) ---
# 設定画面の「使用するAIモデル」に出す候補。モデルは順次廃止されるため、
# 廃止・追加があればこの行を編集する(反映は docker compose restart backend)。
# ここに無いモデルも設定画面の入力欄から自由に追加でき、そちらは data/settings.json に残る。
# 先頭のモデルがOpenAI選択時の既定になる。すべて画像(vision)対応前提。
openai_models = ["gpt-5.4-mini", "gpt-5.4-nano", "gpt-5-mini", "gpt-4o-mini"]

# --- Google Geminiプロバイダー (.env に GEMINI_API_KEY を設定した場合のみ有効) ---
# 仕組みはOpenAIと同じ: 先頭がGemini選択時の既定。すべて画像(vision)対応前提。
gemini_models = ["gemini-3.1-flash-lite", "gemini-2.5-flash", "gemini-2.5-flash-lite"]

[agent]
# 1つの依頼あたりのツール実行ステップ上限
# レポート作成など、見出し・表・本文で十数回ツールを使う依頼では15だと途中で
# 打ち切られやすいため、余裕をもって30にしている。
max_steps = 30

# AIの返事(ストリーミング)が止まったとき、次のデータを何秒待ってから打ち切ってやり直すか
llm_idle_timeout = 180

# AIの1回の返事“全体”の上限秒数。データは届き続けるのに(内部で延々考え込む等)
# いつまでも返事が完成しない「無言の止まり」を、この秒数で打ち切ってやり直す
llm_step_timeout = 240

# クラウド側の一時エラー(500など)が出たときのやり直し設定
# max_attempts: 最大何回撃ち直すか / backoff_cap: 撃ち直しの待ち時間の上限秒数
# (待ち時間は 2→4→8→16… と延び、この上限で頭打ち。7回・上限60秒なら待ち時間の合計は
#  約2分になり、Ollama Cloudの500エラーが2分程度続く波でも失敗で止まらず乗り切れる)
llm_max_attempts = 7
llm_retry_backoff_cap = 60
